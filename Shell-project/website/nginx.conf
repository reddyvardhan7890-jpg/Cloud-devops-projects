server {

    listen 80;

    server_name _;

    root /usr/share/nginx/html;

    index index.html;

    location / {

        try_files $uri $uri/ =404;

    }

    location /cgi-bin/ {

        gzip off;

        fastcgi_pass unix:/run/fcgiwrap.socket;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /usr/lib/cgi-bin$fastcgi_script_name;

    }

}